<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLUTONH ANALYTICS | V7.0 NEBULA APEX</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030305; --bg-panel: #0a0a0f; --bg-card: #12121a;
            --twitch-purple: #9146FF; --accent-blue: #00e5ff; --accent-green: #00ffa3;
            --accent-red: #ff4f4d; --accent-gold: #ffd700; --text-main: #f5f5f7;
            --text-dim: #9aa0a6; --border: rgba(145, 70, 255, 0.2);
            --glow: 0 0 20px rgba(145, 70, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { color-scheme: dark; }
        
        body { 
            background-color: var(--bg-base); color: var(--text-main); 
            font-family: 'Inter', sans-serif; overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, transparent 50%); 
        }

        .container { padding: 20px; max-width: 1650px; margin: 0 auto; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 12px 25px; background: var(--bg-panel); 
            border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--glow); 
        }
        
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; }
        .logo span { color: var(--twitch-purple); }

        .controls-bar { 
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap; 
            background: var(--bg-card); padding: 12px 20px; border-radius: 12px; 
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .date-picker { 
            background: #000; border: 1px solid var(--twitch-purple); color: #fff; 
            padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; 
            font-family: 'Orbitron', sans-serif; cursor: pointer;
        }

        .btn-preset { 
            background: transparent; border: 1px solid var(--border); 
            color: var(--text-dim); padding: 8px 10px; border-radius: 6px; 
            cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.3s;
        }
        .btn-preset:hover { border-color: var(--twitch-purple); color: #fff; }
        .btn-preset.active { background: var(--twitch-purple); color: white; border-color: var(--twitch-purple); box-shadow: 0 0 15px rgba(145, 70, 255, 0.4); }

        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .card { 
            background: var(--bg-panel); border: 1px solid var(--border); 
            border-radius: 15px; padding: 18px; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-5px); border-color: var(--twitch-purple); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .span-2 { grid-column: span 2; } .span-3 { grid-column: span 3; } .row-2 { grid-row: span 2; }

        .kpi-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .kpi-value { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 700; }

        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chart-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--accent-blue); display: flex; align-items: center; gap: 8px; }
        .chart-wrap { height: 320px; width: 100%; }
        
        select { background: #000; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px; font-size: 0.85rem; outline: none; }

        .ai-section { background: linear-gradient(160deg, #0a0a0f 0%, #0d0d1a 100%); border-color: var(--twitch-purple); }
        .ai-btn { 
            background: linear-gradient(45deg, var(--twitch-purple), var(--accent-blue)); 
            border: none; color: white; padding: 8px 16px; border-radius: 8px; 
            font-weight: 800; cursor: pointer; font-family: 'Orbitron', sans-serif; 
            font-size: 0.65rem; transition: 0.3s; animation: pulse-ai 2s infinite;
        }
        @keyframes pulse-ai { 0% { box-shadow: 0 0 0 0 rgba(145, 70, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(145, 70, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(145, 70, 255, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="welcomeScreen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center;">
        <div class="logo" style="font-size: 3rem;">🛰️ PLUTONH <span>NEBULA APEX</span></div>
        <p style="color:var(--text-dim); margin-top:15px; font-family:'Orbitron'">COMMAND & CONTROL INTERFACE</p>
        <button onclick="document.getElementById('csvInput').click()" style="background: var(--twitch-purple); color: white; border: none; padding: 20px 40px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(145,70,255,0.3); margin-top: 25px;">IMPORTER DONNÉES TWITCH</button>
        <input type="file" id="csvInput" accept=".csv" style="display: none;">
    </div>

    <div id="dashboard" style="display:none;">
        <div class="header">
            <div class="logo">NEBULA <span>APEX_V7.0</span></div>
            <div id="activeDateRange" style="font-size: 0.8rem; font-family:'Orbitron'; color: var(--twitch-purple);">ANALYSIS ACTIVE</div>
        </div>

        <div class="controls-bar">
            <div style="display:flex; align-items:center; gap:8px;">
                <button class="btn-preset" onclick="shiftRange(-1)">❮</button>
                <input type="date" id="dateStart" class="date-picker" onchange="refresh()">
                <span style="color:var(--twitch-purple); font-weight:bold;">➔</span>
                <input type="date" id="dateEnd" class="date-picker" onchange="refresh()">
                <button class="btn-preset" onclick="shiftRange(1)">❯</button>
            </div>
            <div style="display:flex; gap:5px; margin-left:10px;">
                <button class="btn-preset" onclick="setTimeRange(7, this)">7J</button>
                <button class="btn-preset active" onclick="setTimeRange(30, this)">30J</button>
                <button class="btn-preset" onclick="setTimeRange(90, this)">3M</button>
                <button class="btn-preset" onclick="setTimeRange(180, this)">6M</button>
                <button class="btn-preset" onclick="setTimeRange(365, this)">1A</button>
                <button class="btn-preset" onclick="setTimeRange('all', this)">MAX</button>
            </div>
            <div style="margin-left:auto; display:flex; gap:10px">
                <select id="metricA" onchange="refresh()"></select>
                <select id="metricB" onchange="refresh()"></select>
                <select id="sma" onchange="refresh()">
                    <option value="1">LISSAGE OFF</option>
                    <option value="7">SMA 7J</option>
                    <option value="14">SMA 14J</option>
                    <option value="30">SMA 30J</option>
                </select>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="card" id="kpi-1"></div>
            <div class="card" id="kpi-2"></div>
            <div class="card" id="kpi-3"></div>
            <div class="card" id="kpi-4"></div>

            <div class="card span-3 row-2">
                <div class="chart-header"><div class="chart-title">🌀 ANALYSE COMPARATIVE TEMPORELLE</div></div>
                <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
            </div>

            <div class="card row-2">
                <div class="chart-header"><div class="chart-title">💰 REVENUS</div></div>
                <div style="height:220px;"><canvas id="revenuePie"></canvas></div>
                <div id="revenueTotal" style="text-align:center; margin-top:15px; font-family:'Orbitron'; font-size:1.1rem; color:var(--accent-green)"></div>
            </div>

            <div class="card span-2 row-2">
                <div class="chart-header">
                    <div class="chart-title">📊 CROISSANCE MENSUELLE vs ANNÉE-1</div>
                    <select id="monthlyMetric" onchange="renderMonthlyTrend()"></select>
                </div>
                <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
            </div>

            <div class="card span-2 row-2 ai-section">
                <div class="chart-header">
                    <div class="chart-title" style="color:var(--accent-green)">🤖 COACHING STRATÉGIQUE AI</div>
                    <button id="mammouthBtn" class="ai-btn" onclick="callMammouthAI()">LANCER ANALYSE</button>
                </div>
                <div id="aiInsights" style="font-size:0.85rem; line-height:1.4; max-height:280px; overflow-y:auto; padding-right:10px;"><p style="color:var(--text-dim); text-align:center; padding-top:100px;">Prêt à analyser vos performances...</p></div>
            </div>

            <div class="card span-2"><div class="chart-header"><div class="chart-title">🔥 DENSITÉ PAR JOUR</div></div><div id="heatmap"></div></div>
            <div class="card span-2"><div class="chart-header"><div class="chart-title">🧬 MATRICE DE CORRÉLATION</div></div><div id="correlationMatrix"></div></div>
        </div>
    </div>
</div>

<script>
    const MAMMOUTH_API_KEY = "sk-V8lDi4z2OqrCHSzKdd9aCA";
    const MAMMOUTH_MODEL = "gemini-3.1-pro-preview";
    let db = [];
    let charts = {};

    const METRICS_DICT = {
        "Spectateurs en moyenne": { label: "Spectateurs Moyens", isAverage: true },
        "Minutes passées en stream": { label: "Durée du Live", isAverage: false },
        "Spectateurs max.": { label: "Pic de Viewers", isAverage: true },
        "Spectateurs uniques": { label: "Viewers Uniques", isAverage: false },
        "Nouveaux followers": { label: "Followers", isAverage: false },
        "Minutes regardées": { label: "Minutes Regardées", isAverage: false },
        "Personnes sur le chat": { label: "Chatteurs Uniques", isAverage: false },
        "_revTotal": { label: "Revenus Totaux ($)", isAverage: false },
        "_stickiness": { label: "Rétention Moyenne (Min)", isAverage: true, calc: r => r["Spectateurs uniques"] > 0 ? r["Minutes regardées"] / r["Spectateurs uniques"] : 0 },
        "_convRate": { label: "Taux Conversion Follow (%)", isAverage: true, calc: r => r["Spectateurs uniques"] > 0 ? (r["Nouveaux followers"] / r["Spectateurs uniques"]) * 100 : 0 },
        "_hypeEfficiency": { label: "Efficacité Hype (Max/Moy)", isAverage: true, calc: r => r["Spectateurs en moyenne"] > 0 ? r["Spectateurs max."] / r["Spectateurs en moyenne"] : 1 },
        "_hourlyEarnings": { label: "Taux Horaire ($/H)", isAverage: true, calc: r => r["Minutes passées en stream"] > 0 ? r._revTotal / (r["Minutes passées en stream"] / 60) : 0 },
        "_revPerUnique": { label: "Valeur / Unique ($)", isAverage: true, calc: r => r["Spectateurs uniques"] > 0 ? r._revTotal / r["Spectateurs uniques"] : 0 }
    };

    document.getElementById('csvInput').addEventListener('change', (e) => {
        if(!e.target.files.length) return;
        Papa.parse(e.target.files[0], {
            header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: (res) => {
                db = res.data.map(r => {
                    r._date = new Date(r.Date);
                    r._revTotal = (r["Revenu issu des abonnements"]||0) + (r["Revenu Prime"]||0) + (r["Revenus issus des abonnements offerts"]||0) + (r["Revenu des Bits"]||0) + (r["Revenu issu de la publicité"]||0) + (r["Revenus Turbo"]||0);
                    Object.keys(METRICS_DICT).forEach(k => { if(METRICS_DICT[k].calc) r[k] = METRICS_DICT[k].calc(r); });
                    return r;
                }).sort((a,b) => a._date - b._date);
                initUI();
            }
        });
    });

    function initUI() {
        ['metricA', 'metricB', 'monthlyMetric'].forEach(id => {
            const el = document.getElementById(id);
            el.innerHTML = id === 'metricB' ? '<option value="none">AUCUNE COMPARAISON</option>' : '';
            Object.keys(METRICS_DICT).forEach(k => el.add(new Option(METRICS_DICT[k].label, k)));
        });
        document.getElementById('metricA').value = "Spectateurs en moyenne";
        document.getElementById('metricB').value = "Minutes passées en stream";
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        setTimeRange(30);
    }

    function setTimeRange(days, btn) {
        const end = db[db.length-1]._date;
        const start = days === 'all' ? db[0]._date : new Date(end.getTime() - (days * 24 * 3600 * 1000));
        document.getElementById('dateStart').valueAsDate = start;
        document.getElementById('dateEnd').valueAsDate = end;
        if(btn) { document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        refresh();
    }

    function shiftRange(dir) {
        const s = document.getElementById('dateStart').valueAsDate;
        const e = document.getElementById('dateEnd').valueAsDate;
        const diff = (e - s) || (30 * 24 * 3600 * 1000);
        document.getElementById('dateStart').valueAsDate = new Date(s.getTime() + diff * dir);
        document.getElementById('dateEnd').valueAsDate = new Date(e.getTime() + diff * dir);
        refresh();
    }

    function refresh() {
        const dS = document.getElementById('dateStart').valueAsDate;
        const dE = document.getElementById('dateEnd').valueAsDate;
        if(!dS || !dE) return;
        dE.setHours(23,59,59);
        const filtered = db.filter(d => d._date >= dS && d._date <= dE);
        const prevS = new Date(dS.getTime() - (dE - dS));
        const prevData = db.filter(d => d._date >= prevS && d._date < dS);
        updateKpis(filtered, prevData);
        renderMainChart(filtered);
        renderRevenuePie(filtered);
        renderMonthlyTrend();
        renderCorrelation(filtered);
        renderHeatmap(filtered);
    }

    function updateKpis(curr, prev) {
        const keys = ["Spectateurs en moyenne", "Nouveaux followers", "_revTotal", "Minutes passées en stream"];
        keys.forEach((k, i) => {
            const getVal = (arr) => {
                const streams = arr.filter(d => d["Minutes passées en stream"] > 0);
                if(METRICS_DICT[k].isAverage) return streams.length ? (streams.reduce((a,b)=>a+(b[k]||0),0) / streams.length) : 0;
                return arr.reduce((a,b)=>a+(b[k]||0),0);
            };
            const val = getVal(curr); const pVal = getVal(prev);
            const delta = pVal > 0 ? ((val - pVal) / pVal * 100) : 0;
            const display = k === "Minutes passées en stream" ? Math.round(val/60)+'h' : (k === "_revTotal" ? val.toFixed(2)+'$' : Math.round(val));
            document.getElementById(`kpi-${i+1}`).innerHTML = `<span class="kpi-title">${METRICS_DICT[k].label}</span><div class="kpi-value">${display}</div><div style="color:${delta>=0?'var(--accent-green)':'var(--accent-red)'}; font-size:0.75rem; font-weight:bold; margin-top:5px;">${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta).toFixed(1)}%</div>`;
        });
    }

    function renderMainChart(data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(charts.main) charts.main.destroy();
        const mA = document.getElementById('metricA').value;
        const mB = document.getElementById('metricB').value;
        const sma = parseInt(document.getElementById('sma').value);
        const streams = data.filter(d => d["Minutes passées en stream"] > 0);
        const labels = streams.map(d => d._date.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}));
        const applySma = (key) => {
            const raw = streams.map(d => d[key]||0);
            if(sma <= 1) return raw;
            return raw.map((_, i) => { const slice = raw.slice(Math.max(0, i-sma+1), i+1); return slice.reduce((a,b)=>a+b,0) / slice.length; });
        };
        const datasets = [{ label: METRICS_DICT[mA].label, data: applySma(mA), borderColor: '#00e5ff', backgroundColor: 'rgba(0, 229, 255, 0.1)', fill: true, tension: 0.4, yAxisID: 'y' }];
        if(mB !== 'none') datasets.push({ label: METRICS_DICT[mB].label, data: applySma(mB), borderColor: '#9146FF', borderDash: [5,5], tension: 0.4, yAxisID: 'y1' });
        charts.main = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { display: true, labels: { color: '#fff', font: { family: 'Orbitron', size: 10 } } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#00e5ff' } }, y1: { display: mB !== 'none', position: 'right', grid: { display: false }, ticks: { color: '#9146FF' } }, x: { ticks: { color: '#666' } } } } });
    }

    function renderMonthlyTrend() {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        if(charts.monthly) charts.monthly.destroy();
        const metric = document.getElementById('monthlyMetric').value;
        const isAvg = METRICS_DICT[metric].isAverage;
        const groups = {};
        db.forEach(d => {
            const id = d._date.getFullYear() + "-" + d._date.getMonth();
            if(!groups[id]) groups[id] = { val: 0, count: 0, date: d._date };
            if(d["Minutes passées en stream"] > 0) { groups[id].val += d[metric] || 0; groups[id].count++; }
        });
        const lastKeys = Object.keys(groups).sort().slice(-12);
        const currentData = lastKeys.map(k => isAvg ? (groups[k].count ? groups[k].val/groups[k].count : 0) : groups[k].val);
        const labels = lastKeys.map(k => groups[k].date.toLocaleString('fr-FR', {month:'short', year:'2-digit'}));
        const prevYearData = lastKeys.map(k => {
            const d = groups[k].date; const prevId = (d.getFullYear()-1) + "-" + d.getMonth();
            if(!groups[prevId]) return 0;
            return isAvg ? (groups[prevId].count ? groups[prevId].val/groups[prevId].count : 0) : groups[prevId].val;
        });
        charts.monthly = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ label: 'Actuel', data: currentData, backgroundColor: '#00e5ff', borderRadius: 4 }, { label: 'Année-1', data: prevYearData, backgroundColor: 'rgba(145, 70, 255, 0.4)', borderRadius: 4 }]}, options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } } } });
    }

    function renderRevenuePie(data) {
        const ctx = document.getElementById('revenuePie').getContext('2d');
        if(charts.pie) charts.pie.destroy();
        const sums = { 
            "Subs (Dir/Prime)": data.reduce((a,b)=>a+(b["Revenu issu des abonnements"]||0)+(b["Revenu Prime"]||0), 0),
            "Subs Offerts": data.reduce((a,b)=>a+(b["Revenus issus des abonnements offerts"]||0), 0),
            "Bits": data.reduce((a,b)=>a+(b["Revenu des Bits"]||0), 0),
            "Publicité": data.reduce((a,b)=>a+(b["Revenu issu de la publicité"]||0), 0)
        };
        const total = Object.values(sums).reduce((a,b)=>a+b,0);
        document.getElementById('revenueTotal').innerText = `TOTAL: ${total.toFixed(2)}$`;
        charts.pie = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(sums), datasets: [{ data: Object.values(sums), backgroundColor: ['#9146FF', '#bf94ff', '#00ffa3', '#ffd700'], borderWidth: 0, hoverOffset: 15 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color:'#fff', boxWidth: 10, font: { size: 9 } } } }, cutout: '70%' } });
    }

    function renderCorrelation(data) {
        const target = document.getElementById('metricA').value;
        const streams = data.filter(d => d["Minutes passées en stream"] > 0);
        if(streams.length < 3) return;
        const calcCorr = (x, y) => {
            const n = x.length; const sX = x.reduce((a,b)=>a+b,0); const sY = y.reduce((a,b)=>a+b,0);
            const sXY = x.reduce((a,b,i)=>a+b*y[i],0); const sX2 = x.reduce((a,b)=>a+b*b,0); const sY2 = y.reduce((a,b)=>a+b*b,0);
            const num = n * sXY - sX * sY; const den = Math.sqrt((n * sX2 - sX*sX) * (n * sY2 - sY*sY));
            return den === 0 ? 0 : num / den;
        };
        const targetArr = streams.map(d => d[target]);
        const html = Object.keys(METRICS_DICT).filter(k => k !== target && !k.startsWith('_')).slice(0, 5).map(k => {
            const val = calcCorr(targetArr, streams.map(d => d[k]||0));
            const color = val > 0 ? 'var(--accent-green)' : 'var(--accent-red)';
            return `<div style="display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:0.7rem;">
                <span style="width:100px; color:var(--text-dim)">${METRICS_DICT[k].label}</span>
                <div style="flex:1; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden;"><div style="width:${Math.abs(val)*100}%; height:100%; background:${color}"></div></div>
                <span style="color:${color}; font-weight:bold">${val.toFixed(2)}</span>
            </div>`;
        }).join('');
        document.getElementById('correlationMatrix').innerHTML = html;
    }

    function renderHeatmap(data) {
        const days = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];
        const metric = document.getElementById('metricA').value;
        const stats = [0,1,2,3,4,5,6].map(() => ({ sum: 0, count: 0 }));
        data.forEach(d => { if(d["Minutes passées en stream"] > 0) { let day = d._date.getDay() - 1; if(day === -1) day = 6; stats[day].sum += d[metric] || 0; stats[day].count++; } });
        const averages = stats.map(s => s.count > 0 ? s.sum/s.count : 0);
        const max = Math.max(...averages);
        let html = '<div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px; margin-top:10px;">';
        averages.forEach((avg, i) => { 
            const intensity = max > 0 ? avg/max : 0; 
            html += `<div style="text-align:center"><div style="height:30px; border-radius:4px; background:rgba(145,70,255,${0.1 + intensity*0.8}); border:1px solid rgba(145,70,255,${intensity})"></div><div style="font-size:0.55rem; color:var(--text-dim); margin-top:4px;">${days[i]}</div></div>`; 
        });
        document.getElementById('heatmap').innerHTML = html + '</div>';
    }

    async function callMammouthAI() {
        const btn = document.getElementById('mammouthBtn'); const aiContainer = document.getElementById('aiInsights');
        btn.innerText = "CALCULS..."; btn.disabled = true;
        const getP = (days) => {
            const end = db[db.length-1]._date; const start = new Date(end.getTime() - (days * 24 * 3600 * 1000));
            const f = db.filter(d => d._date >= start && d["Minutes passées en stream"] > 0);
            return f.length ? `Streams: ${f.length}, Moy: ${Math.round(f.reduce((a,b)=>a+b["Spectateurs en moyenne"],0)/f.length)}, Rev: ${f.reduce((a,b)=>a+b._revTotal,0).toFixed(0)}$` : "N/A";
        };
        const prompt = `Analyste Strategique: 7j: ${getP(7)} | 30j: ${getP(30)} | 365j: ${getP(365)}. Donne un diagnostic en HTML simple.`;
        try {
            const resp = await fetch("https://api.mammouth.ai/v1/chat/completions", { method: "POST", headers: { "Authorization": `Bearer ${MAMMOUTH_API_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify({ model: MAMMOUTH_MODEL, messages: [{role:"system", content:"Tu es Nebula AI. Réponds en HTML."}, {role:"user", content:prompt}] }) });
            const data = await resp.json(); aiContainer.innerHTML = data.choices[0].message.content;
        } catch(e) { aiContainer.innerHTML = "Erreur API."; }
        btn.innerText = "LANCER ANALYSE"; btn.disabled = false;
    }
</script>
</body>
</html>
